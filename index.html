<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso · Inversiones Alun SpA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#6E8169; --blue-dark:#3E4D5C; --gold:#C9BC72; --ink:#2C3640;
    --bg:#F4F5F1; --surface:#fff; --border:#DEE2D8; --text:#2C3640; --text-muted:#6E7A70;
    --green-dark:#27500A; --red-dark:#791F1F; --radius:14px;
    --font-head:"Fraunces",Georgia,serif; --font-body:"Hanken Grotesk",system-ui,sans-serif;
    --font-mono:"IBM Plex Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    width:100%;max-width:400px;padding:2rem;box-shadow:0 10px 40px rgba(44,54,64,.08)}
  .logo{width:52px;height:52px;border-radius:12px;background:var(--blue-dark);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:1rem}
  h1{font-family:var(--font-head);font-size:22px;font-weight:600;margin-bottom:4px}
  .sub{font-family:var(--font-mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--text-muted);margin-bottom:1.5rem}
  label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text-muted)}
  input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;
    font-family:var(--font-body);font-size:15px;margin-bottom:1rem;background:var(--bg)}
  input:focus{outline:none;border-color:var(--blue)}
  button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--blue-dark);
    color:#fff;font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer}
  button:hover{background:#33414e} button:disabled{opacity:.55;cursor:default}
  .msg{font-size:13px;margin-top:1rem;padding:10px 12px;border-radius:10px;display:none}
  .msg.err{display:block;background:#FCEBEB;color:var(--red-dark)}
  .msg.ok{display:block;background:#EAF3DE;color:var(--green-dark)}
  .hint{font-size:12px;color:var(--text-muted);margin-top:1rem;line-height:1.5}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><i class="ti ti-shield-lock"></i></div>
    <h1>Inversiones Alun SpA</h1>
    <p class="sub">Portal interno · Cumplimiento UAF</p>

    <label for="email">Correo</label>
    <input id="email" type="email" autocomplete="username" placeholder="nombre@inversionesalun.cl" />

    <label for="password">Contraseña</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

    <button id="btn-entrar">Ingresar al portal</button>
    <p class="hint">Acceso restringido al personal autorizado de Inversiones Alun SpA.</p>

    <div id="msg" class="msg"></div>
  </div>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="src/config/firebase.js"></script>
  <script src="src/controllers/authController.js"></script>
  <script>
    (function () {
      const A = window.Alun;
      const $ = (id) => document.getElementById(id);
      const msg = $("msg");
      const show = (t, kind) => { msg.textContent = t || "Ocurrió un problema."; msg.className = "msg " + kind; };

      // Si ya hay sesión válida, ir directo al portal.
      A.auth.sesion().then((u) => {
        if (u && A.isAllowed(u.email)) window.location.replace("app.html");
      });

      // Avisa si la sesión se cerró sola por inactividad (15 min sin uso).
      try {
        if (sessionStorage.getItem("alun_motivo_salida") === "inactividad") {
          show("Su sesión se cerró automáticamente por inactividad. Ingrese nuevamente.", "err");
          sessionStorage.removeItem("alun_motivo_salida");
        }
      } catch (e) {}

      async function entrar() {
        msg.className = "msg";
        const btn = $("btn-entrar");
        btn.disabled = true; btn.textContent = "Ingresando…";
        const r = await A.auth.login($("email").value, $("password").value);
        btn.disabled = false; btn.textContent = "Ingresar al portal";
        if (!r.ok) return show(r.error, "err");
        window.location.replace("app.html");
      }

      $("btn-entrar").addEventListener("click", entrar);
      $("password").addEventListener("keydown", (e) => { if (e.key === "Enter") entrar(); });
      $("email").addEventListener("keydown", (e) => { if (e.key === "Enter") $("password").focus(); });
    })();
  </script>
</body>
</html>
