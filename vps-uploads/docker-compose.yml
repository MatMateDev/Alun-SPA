services:
  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads-data:/data
      - ./secrets/firebase-service-account.json:/secrets/firebase-service-account.json:ro
    networks: [internal]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    depends_on: [api]
    networks: [internal]

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

volumes:
  uploads-data:
  certbot-www:
  certbot-conf:

networks:
  internal:
