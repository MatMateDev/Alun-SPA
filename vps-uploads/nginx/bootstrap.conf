# Config temporal (solo HTTP) usada por init-cert.sh para obtener el primer
# certificado de Let's Encrypt. Se reemplaza por ssl.conf una vez emitido.
server {
  listen 80;
  server_name archivos.sistema.inversionesalun.cl;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 200 "ok"; }
}
