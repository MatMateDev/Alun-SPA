# Config final (HTTPS) — se activa después de obtener el certificado.
server {
  listen 80;
  server_name archivos.inversionesalun.cl;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl;
  server_name archivos.inversionesalun.cl;

  ssl_certificate     /etc/letsencrypt/live/archivos.inversionesalun.cl/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/archivos.inversionesalun.cl/privkey.pem;

  client_max_body_size 300M;   # permite archivos grandes (ajusta MAX_FILE_MB junto con esto)
  proxy_read_timeout 120s;

  location / {
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
