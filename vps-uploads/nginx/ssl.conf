# Config final (HTTPS) — se activa después de obtener el certificado.
server {
  listen 80;
  server_name archivos.sistema.inversionesalun.cl;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl;
  server_name archivos.sistema.inversionesalun.cl;

  ssl_certificate     /etc/letsencrypt/live/archivos.sistema.inversionesalun.cl/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/archivos.sistema.inversionesalun.cl/privkey.pem;

  client_max_body_size 60M;  # datos JSON (los archivos van por /api/upload, sin límite)
  proxy_read_timeout 600s;

  # Subida de archivos: SIN límite de tamaño (limitado solo por el disco del VPS),
  # sin buffering para que el archivo fluya directo a la API.
  location = /api/upload {
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
